services:
  app:
    build: .
    container_name: rbac-system
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rbac-system-network
    ports:
      - "8080:8080"

  db:
    image: mysql:8.0
    container_name: rbac-system-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    networks:
      - rbac-system-network
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rbac-system-network

volumes:
  mysql_data:

networks:
  rbac-system-network: